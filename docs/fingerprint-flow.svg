<svg viewBox="0 0 780 600" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>Fingerprint-based native build skip on Bitrise</title>
  <desc>Native inputs are fingerprinted into a cache key. On a cache miss the workflow does a full native build and caches the signed app. On a cache hit (a JS-only change) it swaps a freshly built JS bundle into the cached app and re-signs, skipping the native build entirely.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#5E6C84"/>
    </marker>
  </defs>

  <rect width="780" height="600" fill="#FFFFFF"/>

  <text x="34" y="38" font-size="21" font-weight="700" fill="#172B4D">Fingerprint → cache → skip the native build</text>
  <text x="34" y="60" font-size="13" fill="#5E6C84">Free Bitrise key-value cache · same pattern for Android (APK) and iOS (.xcarchive / IPA)</text>

  <!-- Tier 1: inputs -> fingerprint -> restore -->
  <g>
    <rect x="34" y="86" width="220" height="64" rx="10" fill="#F4F5F7" stroke="#DFE1E6" stroke-width="1.5"/>
    <text x="144" y="112" font-size="14" font-weight="700" fill="#172B4D" text-anchor="middle">Native inputs</text>
    <text x="144" y="132" font-size="11.5" fill="#5E6C84" text-anchor="middle">package.json · lockfile · app.json</text>

    <line x1="254" y1="118" x2="286" y2="118" stroke="#5E6C84" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="288" y="86" width="204" height="64" rx="10" fill="#EAE6FF" stroke="#6554C0" stroke-width="1.5"/>
    <text x="390" y="112" font-size="14" font-weight="700" fill="#403294" text-anchor="middle">Fingerprint step</text>
    <text x="390" y="132" font-size="11.5" fill="#5243AA" text-anchor="middle">→ BUNDLE_HASH_STRING (key)</text>

    <line x1="492" y1="118" x2="524" y2="118" stroke="#5E6C84" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="526" y="86" width="220" height="64" rx="10" fill="#F4F5F7" stroke="#DFE1E6" stroke-width="1.5"/>
    <text x="636" y="112" font-size="14" font-weight="700" fill="#172B4D" text-anchor="middle">restore-cache</text>
    <text x="636" y="132" font-size="11.5" fill="#5E6C84" text-anchor="middle">hit or miss? (BITRISE_CACHE_HIT)</text>
  </g>

  <!-- Fork -->
  <line x1="636" y1="150" x2="636" y2="176" stroke="#5E6C84" stroke-width="2"/>
  <path d="M636 176 H210 V196" fill="none" stroke="#FF991F" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M636 176 H570 V196" fill="none" stroke="#36B37E" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- MISS lane -->
  <g>
    <rect x="34" y="198" width="352" height="352" rx="12" fill="#FFFBF2" stroke="#FFE0B2" stroke-width="1.5"/>
    <rect x="60" y="212" width="300" height="52" rx="9" fill="#FFF0D6" stroke="#FF991F" stroke-width="1.5"/>
    <text x="210" y="234" font-size="14" font-weight="700" fill="#974F0C" text-anchor="middle">Cache MISS</text>
    <text x="210" y="252" font-size="11.5" fill="#8A5300" text-anchor="middle">a dependency / native input changed</text>

    <line x1="210" y1="264" x2="210" y2="286" stroke="#FF991F" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="60" y="288" width="300" height="52" rx="9" fill="#FFFFFF" stroke="#FFC27A" stroke-width="1.5"/>
    <text x="210" y="310" font-size="13.5" font-weight="600" fill="#172B4D" text-anchor="middle">Full native build</text>
    <text x="210" y="328" font-size="11.5" fill="#5E6C84" text-anchor="middle">Gradle assembleRelease / Xcode</text>

    <line x1="210" y1="340" x2="210" y2="362" stroke="#FF991F" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="60" y="364" width="300" height="52" rx="9" fill="#FFFFFF" stroke="#FFC27A" stroke-width="1.5"/>
    <text x="210" y="386" font-size="13.5" font-weight="600" fill="#172B4D" text-anchor="middle">Save the signed app to cache</text>
    <text x="210" y="404" font-size="11.5" fill="#5E6C84" text-anchor="middle">keyed by the fingerprint</text>

    <text x="210" y="470" font-size="34" font-weight="800" fill="#DE350B" text-anchor="middle">≈ 3.5 min</text>
    <text x="210" y="494" font-size="12" fill="#8A5300" text-anchor="middle">Gradle step alone: 2.9 min</text>
    <text x="210" y="524" font-size="11.5" fill="#8A5300" text-anchor="middle">Runs once per native change</text>
  </g>

  <!-- HIT lane -->
  <g>
    <rect x="394" y="198" width="352" height="352" rx="12" fill="#F2FCF7" stroke="#B3F0D3" stroke-width="1.5"/>
    <rect x="420" y="212" width="300" height="52" rx="9" fill="#DCFBEC" stroke="#36B37E" stroke-width="1.5"/>
    <text x="570" y="234" font-size="14" font-weight="700" fill="#006644" text-anchor="middle">Cache HIT</text>
    <text x="570" y="252" font-size="11.5" fill="#00875A" text-anchor="middle">only JavaScript changed</text>

    <line x1="570" y1="264" x2="570" y2="286" stroke="#36B37E" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="420" y="288" width="300" height="52" rx="9" fill="#FFFFFF" stroke="#79D9AC" stroke-width="1.5"/>
    <text x="570" y="310" font-size="13.5" font-weight="600" fill="#172B4D" text-anchor="middle">Rebuild only the JS bundle</text>
    <text x="570" y="328" font-size="11.5" fill="#5E6C84" text-anchor="middle">Metro + Hermes</text>

    <line x1="570" y1="340" x2="570" y2="362" stroke="#36B37E" stroke-width="2" marker-end="url(#arrow)"/>
    <rect x="420" y="364" width="300" height="52" rx="9" fill="#FFFFFF" stroke="#79D9AC" stroke-width="1.5"/>
    <text x="570" y="386" font-size="13.5" font-weight="600" fill="#172B4D" text-anchor="middle">Swap into cached app + re-sign</text>
    <text x="570" y="404" font-size="11.5" fill="#5E6C84" text-anchor="middle">zipalign · apksigner — no Gradle</text>

    <text x="570" y="470" font-size="34" font-weight="800" fill="#006644" text-anchor="middle">≈ 44 sec</text>
    <text x="570" y="494" font-size="12" fill="#00875A" text-anchor="middle">bundle-swap step: 16 sec</text>
    <text x="570" y="524" font-size="11.5" fill="#00875A" text-anchor="middle">Every JS-only iteration</text>
  </g>

  <text x="390" y="576" font-size="11.5" fill="#5E6C84" text-anchor="middle">Measured on the expo-build-fingerprint-demo app — a JS-only change went from ~3.5 min to ~44 s (≈4.8× faster).</text>
</svg>
